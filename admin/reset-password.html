<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    :root{--navy:#0B1829;--gold:#C8A44A;--white:#fff;--red:#DC2626;--green:#059669;--gray-4:#D1D5DB}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--navy);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
    .card{background:var(--white);border-radius:16px;padding:2.5rem;max-width:380px;width:100%;box-shadow:0 32px 64px rgba(0,0,0,.4)}
    h2{font-size:1.3rem;color:var(--navy);margin-bottom:.5rem}
    p{font-size:.875rem;color:#6B7280;margin-bottom:1.5rem}
    .form-group{margin-bottom:1rem}
    label{display:block;font-size:.82rem;font-weight:600;color:var(--navy);margin-bottom:.4rem}
    input{width:100%;padding:.72rem 1rem;border:1.5px solid var(--gray-4);border-radius:8px;font-size:.875rem;font-family:inherit;outline:none;transition:border-color .2s}
    input:focus{border-color:var(--gold)}
    button{width:100%;padding:.85rem;background:var(--navy);color:white;border:none;border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer;transition:opacity .2s;font-family:inherit}
    button:disabled{opacity:.55}
    .alert{padding:.85rem 1rem;border-radius:8px;margin-bottom:1rem;font-size:.85rem}
    .alert-danger{background:#FEF2F2;color:#991B1B;border-left:4px solid var(--red)}
    .alert-success{background:#ECFDF5;color:#065F46;border-left:4px solid var(--green)}
  </style>
</head>
<body>
<div class="card">
  <h2>🔑 Reset Password</h2>
  <p>Masukkan password baru Anda di bawah ini.</p>
  <div id="alert"></div>
  <div class="form-group">
    <label>Password Baru</label>
    <input type="password" id="pass1" placeholder="Minimal 6 karakter"/>
  </div>
  <div class="form-group">
    <label>Konfirmasi Password</label>
    <input type="password" id="pass2" placeholder="Ulangi password"/>
  </div>
  <button id="btn" onclick="doReset()">Simpan Password Baru</button>
</div>
<script src="../assets/js/config.js"></script>
<script>
async function doReset() {
  const p1  = document.getElementById('pass1').value;
  const p2  = document.getElementById('pass2').value;
  const btn = document.getElementById('btn');
  const al  = document.getElementById('alert');
  al.innerHTML = '';
  if(!p1||p1.length<6) { al.innerHTML='<div class="alert alert-danger">Password minimal 6 karakter.</div>'; return; }
  if(p1!==p2) { al.innerHTML='<div class="alert alert-danger">Password tidak cocok.</div>'; return; }
  btn.disabled = true; btn.textContent = 'Menyimpan...';
  const { error } = await sb.auth.updateUser({ password: p1 });
  if(error) {
    al.innerHTML = `<div class="alert alert-danger">${error.message}</div>`;
    btn.disabled=false; btn.textContent='Simpan Password Baru';
  } else {
    al.innerHTML = '<div class="alert alert-success">✅ Password berhasil diubah! Mengalihkan ke login...</div>';
    setTimeout(()=>window.location.href='login.html', 2000);
  }
}
</script>
</body>
</html>
